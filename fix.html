<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إصلاح سريع - Dolcera</title>
<style>
body {
  font-family: 'Tajawal', sans-serif;
  background: #0a0e1a;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 2rem;
}
.container {
  max-width: 500px;
}
h1 {
  color: #c8a14c;
  font-size: 2rem;
  margin-bottom: 1rem;
}
.btn {
  background: #c8a14c;
  color: #000;
  padding: 15px 30px;
  border: none;
  border-radius: 8px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  margin: 1rem;
}
.btn:hover {
  background: #e6cd86;
}
.result {
  background: #1a1f35;
  padding: 1.5rem;
  border-radius: 12px;
  margin-top: 2rem;
  display: none;
}
.result.show {
  display: block;
}
.success {
  color: #2dd4a0;
}
</style>
</head>
<body>

<div class="container">
  <h1>🔧 إصلاح سريع - Dolcera</h1>
  <p>إذا كان الموقع لا يعمل، اضغط الزر أدناه لإصلاح المشكلة</p>
  
  <button class="btn" onclick="clearAndReload()">
    🗑️ مسح البيانات القديمة وإعادة التحميل
  </button>
  
  <div class="result" id="result">
    <h2 class="success">✅ تم!</h2>
    <p>جاري إعادة توجيهك للصفحة الرئيسية...</p>
  </div>
</div>

<script>
function clearAndReload() {
  console.log('🗑️ Clearing localStorage...');
  localStorage.clear();
  
  console.log('🗑️ Clearing sessionStorage...');
  sessionStorage.clear();
  
  console.log('✅ Done!');
  
  document.getElementById('result').classList.add('show');
  
  setTimeout(() => {
    window.location.href = '/';
  }, 2000);
}

// Auto-clear on load if ?fix parameter
if(window.location.search.includes('fix')) {
  clearAndReload();
}
</script>

</body>
</html>
